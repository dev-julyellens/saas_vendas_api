# Orquestração Docker — ambiente de desenvolvimento e produção local.
# Decisão: serviços separados (app, nginx, postgres, redis, queue) para escalar workers
# independentemente da API e isolar falhas de fila do tráfego HTTP.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_vendas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-saas.ini
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas_network

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_vendas_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - saas_network

  postgres:
    image: postgres:16-alpine
    container_name: saas_vendas_postgres
    restart: unless-stopped
    # DB_PUBLISH_PORT = host (DBeaver); DB_PORT no .env = porta interna (5432) para o Laravel
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-saas_vendas}
      POSTGRES_USER: ${DB_USERNAME:-saas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-saas} -d ${DB_DATABASE:-saas_vendas}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    container_name: saas_vendas_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - saas_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_vendas_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - saas_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_vendas_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - saas_network

volumes:
  postgres_data:
  redis_data:

networks:
  saas_network:
    driver: bridge
